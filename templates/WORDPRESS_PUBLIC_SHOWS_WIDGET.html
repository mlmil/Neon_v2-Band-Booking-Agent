<!--
Neon Blonde WordPress Public Shows Widget

Use this in a WordPress Custom HTML block.

Purpose:
- Keep the public website schedule visually similar to the existing card layout.
- Pull public gig data from the Band Sheet JSON source.
- Hide internal Band Sheet sections, member availability, free weekends, admin notes, and test venues.

Public data shown:
- date
- venue/public event name
- city
- start time
-->

<section id="neon-public-shows" class="neon-public-shows">
  <style>
    #neon-public-shows {
      --nb-bg: #10000c;
      --nb-card: rgba(22, 0, 18, 0.9);
      --nb-border: rgba(255, 0, 220, 0.28);
      --nb-pink: #ff00df;
      --nb-yellow: #fff100;
      --nb-white: #f4edf4;
      --nb-muted: #b9a9b6;
      background: var(--nb-bg);
      color: var(--nb-white);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      padding: 44px 18px 30px;
      text-align: center;
    }

    #neon-public-shows * {
      box-sizing: border-box;
    }

    #neon-public-shows .nb-title {
      display: inline-block;
      margin: 0 0 28px;
      padding: 0 0 8px;
      border-bottom: 1px solid var(--nb-pink);
      color: var(--nb-white);
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    #neon-public-shows .nb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 14px;
      max-width: 1080px;
      margin: 0 auto 48px;
    }

    #neon-public-shows .nb-show-card {
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      min-height: 80px;
      gap: 16px;
      padding: 10px 14px;
      border: 1px solid var(--nb-border);
      border-radius: 8px;
      background: var(--nb-card);
      text-align: left;
    }

    #neon-public-shows .nb-logo {
      width: 58px;
      height: 58px;
      border: 2px solid var(--nb-pink);
      border-radius: 999px;
      background: #070007;
      object-fit: cover;
    }

    #neon-public-shows .nb-logo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--nb-pink);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      text-transform: uppercase;
    }

    #neon-public-shows .nb-date {
      color: var(--nb-yellow);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
    }

    #neon-public-shows .nb-venue {
      margin-top: 3px;
      color: var(--nb-muted);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.05;
    }

    #neon-public-shows .nb-meta {
      margin-top: 2px;
      color: var(--nb-pink);
      font-size: 14px;
      line-height: 1.05;
    }

    #neon-public-shows .nb-booking {
      margin: 0;
      color: var(--nb-white);
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      text-transform: uppercase;
    }

    #neon-public-shows .nb-booking-sub {
      margin: 6px 0 0;
      color: var(--nb-white);
      font-size: 15px;
      line-height: 1.3;
    }

    #neon-public-shows .nb-status {
      color: var(--nb-muted);
      font-size: 16px;
      padding: 18px 0 44px;
    }

    @media (max-width: 640px) {
      #neon-public-shows {
        padding-left: 12px;
        padding-right: 12px;
      }

      #neon-public-shows .nb-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <h2 class="nb-title">Upcoming Shows</h2>
  <div class="nb-grid" data-nb-shows>
    <div class="nb-status">Loading shows...</div>
  </div>
  <h3 class="nb-booking" data-nb-booking>Now Booking</h3>
  <p class="nb-booking-sub">Get on our calendar now. Let us rock your room.</p>

  <script>
    (function () {
      const DATA_URL = "https://mlmil.github.io/NeonBlonde-Bandsheet/docs/bandsheet-data.json";
      const grid = document.querySelector("#neon-public-shows [data-nb-shows]");
      const booking = document.querySelector("#neon-public-shows [data-nb-booking]");

      const venueImages = [
        ["cruisery", "https://neonblonde.band/wp-content/uploads/2025/05/Cruisery.jpg"],
        ["fess parker", "https://neonblonde.band/wp-content/uploads/2025/02/Fess_Parker.png"],
        ["leashless", "https://neonblonde.band/wp-content/uploads/2025/05/Leashless.jpg"],
        ["m special", "https://neonblonde.band/wp-content/uploads/2025/09/May02-MSpecial.jpg"],
        ["ms special", "https://neonblonde.band/wp-content/uploads/2025/09/May02-MSpecial.jpg"],
        ["private", "https://neonblonde.band/wp-content/uploads/2024/09/Logo-24-Stack_Blk.png"],
        ["wedding", "https://neonblonde.band/wp-content/uploads/2024/09/Logo-24-Stack_Blk.png"],
        ["fox wine", "https://neonblonde.band/wp-content/uploads/2024/09/Logo-24-Stack_Blk.png"],
        ["santa barbara yacht club", "https://neonblonde.band/wp-content/uploads/2024/09/Logo-24-Stack_Blk.png"]
      ];

      const hiddenPatterns = [
        /promo|automation|design session/i,
        /club babaloo|club bobaloo/i
      ];

      function publicBookingLabel(now) {
        const year = now.getFullYear();
        const month = now.getMonth();
        if (month >= 8 && month <= 10) return "Now Booking Winter " + (year + 1);
        if (month === 11 || month <= 1) return "Now Booking Spring " + year;
        if (month >= 2 && month <= 4) return "Now Booking Summer " + year;
        return "Now Booking Fall " + year + "/" + (year + 1);
      }

      function parseGig(line) {
        const match = line.match(/^[A-Z]{3}\s+(\d{1,2})-(\d{1,2})-(\d{4})\s+@([0-9:]+[AP]M)\s+—\s+(.+)$/);
        if (!match) return null;
        const month = Number(match[1]);
        const day = Number(match[2]);
        const year = Number(match[3]);
        const time = match[4].toLowerCase();
        const label = match[5].trim();
        const pieces = label.split(",");
        const city = pieces.length > 1 ? pieces.pop().trim() : "";
        const venue = pieces.join(",").trim() || label;
        return { month, day, year, time, venue, city, label };
      }

      function dateLabel(gig) {
        const date = new Date(gig.year, gig.month - 1, gig.day);
        return date.toLocaleDateString("en-US", { month: "long", day: "numeric" });
      }

      function imageFor(venue) {
        const lower = venue.toLowerCase();
        const hit = venueImages.find(([key]) => lower.includes(key));
        return hit ? hit[1] : "";
      }

      function cardFor(gig) {
        const image = imageFor(gig.venue);
        const logo = image
          ? '<img class="nb-logo" src="' + image + '" alt="" loading="lazy">'
          : '<span class="nb-logo nb-logo-fallback">Neon<br>Blonde</span>';
        const city = gig.city ? " - " + gig.city : "";
        return [
          '<article class="nb-show-card">',
          logo,
          '<div>',
          '<div class="nb-date">' + dateLabel(gig) + '</div>',
          '<div class="nb-venue">' + gig.venue + '</div>',
          '<div class="nb-meta">' + gig.time + city + '</div>',
          '</div>',
          '</article>'
        ].join("");
      }

      fetch(DATA_URL, { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) throw new Error("Could not load shows");
          return response.json();
        })
        .then(function (data) {
          const gigs = (data.booked_gigs || [])
            .filter(function (line) {
              return !hiddenPatterns.some(function (pattern) { return pattern.test(line); });
            })
            .map(parseGig)
            .filter(Boolean)
            .slice(0, 12);

          grid.innerHTML = gigs.length
            ? gigs.map(cardFor).join("")
            : '<div class="nb-status">No public shows listed right now.</div>';
          booking.textContent = publicBookingLabel(new Date());
        })
        .catch(function () {
          grid.innerHTML = '<div class="nb-status">Shows are updating. Check back soon.</div>';
          booking.textContent = publicBookingLabel(new Date());
        });
    })();
  </script>
</section>
